services:
  webserver:
    container_name: transcendence_webserver

    build:
      context: .
      dockerfile: services/nginx/Dockerfile

    ports:
      - "8080:80"

    networks:
      transcendence_network:

  api:
    container_name: transcendence_api

    build:
      context: .
      dockerfile: services/api/Dockerfile

    env_file:
        - env/.env.api
    ports:
      - "3001:3000"

    networks:
      transcendence_network:

networks:
  transcendence_network:
    driver: bridge
