services:
  frontend:
    container_name: transcendence_client

    build:
      context: .
      dockerfile: frontend/Dockerfile

    ports:
      - "8080:80"

    networks:
      transcendence_network:

  backend:
    container_name: transcendence_server

    build:
      context: .
      dockerfile: backend/Dockerfile

    ports:
      - "3000:3000"

    networks:
      transcendence_network:

networks:
  transcendence_network:
    driver: bridge
